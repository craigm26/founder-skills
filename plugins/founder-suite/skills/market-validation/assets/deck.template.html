<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Is there a market for ShiftMate? — Evidence pack</title>
<style>
  :root{
    --paper:#fffff8; --ink:#1a1a1a; --soft:#55514a; --rule:#ddd8c4;
    --durable:#2f6b4f; --frozen:#9a958a; --alert:#a23b2e; --amber:#9a6312;
    --maxw:840px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    font-size:18px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px 120px}
  h1,h2,h3,.kicker,.lbl,nav,.tag,.confbar,th,.srcnum,.chartcap,.note{font-family:"Inter","Helvetica Neue",Arial,sans-serif}
  h1{font-size:34px; line-height:1.12; font-weight:700; letter-spacing:-.02em; margin:.2em 0 .15em}
  .sub{font-size:19px; color:var(--soft); font-weight:400; max-width:680px}
  .prov{font-family:"Inter",sans-serif; font-size:12.5px; color:var(--soft); letter-spacing:.01em; margin-top:14px; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:8px 0}
  h2{font-size:13px; text-transform:uppercase; letter-spacing:.13em; font-weight:700; color:var(--ink);
     margin:54px 0 4px; padding-bottom:6px; border-bottom:2px solid var(--ink)}
  h2 .n{color:var(--frozen); margin-right:10px}
  h3{font-size:16px; font-weight:600; margin:22px 0 2px}
  p{margin:.55em 0}
  a{color:inherit}
  /* header */
  nav{position:sticky; top:0; z-index:20; background:rgba(255,255,248,.94); backdrop-filter:saturate(140%) blur(6px);
      border-bottom:1px solid var(--rule); display:flex; align-items:center; gap:4px; padding:9px 18px; flex-wrap:wrap}
  nav .navttl{font-size:12.5px; font-weight:700; letter-spacing:.02em; margin-right:auto}
  nav a.jump{font-size:12px; color:var(--soft); text-decoration:none; padding:4px 8px; border-radius:5px}
  nav a.jump:hover{background:#f0ecd8; color:var(--ink)}
  .btn{font-family:"Inter",sans-serif; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--ink);
       background:var(--ink); color:var(--paper); padding:6px 12px; border-radius:6px; letter-spacing:.02em}
  .btn.ghost{background:transparent; color:var(--ink)}
  .btn:active{transform:translateY(1px)}
  /* verdict */
  .verdict{font-size:21px; line-height:1.4; font-weight:600; margin:14px 0 6px}
  .conf{display:grid; grid-template-columns:1fr auto; gap:2px 16px; align-items:center; margin:18px 0 6px;
        border:1px solid var(--rule); border-radius:8px; padding:12px 16px}
  .conf .clbl{font-size:14.5px}
  .conf .pill{font-family:"Inter",sans-serif; font-size:11px; font-weight:700; letter-spacing:.06em; padding:3px 9px; border-radius:20px; text-align:center; min-width:78px}
  .pill.HIGH{background:#e2efe7; color:var(--durable); border:1px solid #b7d6c4}
  .pill.MODERATE{background:#f6efdc; color:var(--amber); border:1px solid #e3d3a6}
  .pill.LOW{background:#f5e3df; color:var(--alert); border:1px solid #e3bdb4}
  /* citations */
  .cite{font-family:"Inter",sans-serif; font-size:.66em; font-weight:700; vertical-align:super; color:var(--durable);
        text-decoration:none; padding:0 1px; cursor:pointer}
  .cite:hover{background:#e2efe7; border-radius:3px}
  /* pain quotes */
  .qitem{margin:16px 0; padding-left:16px; border-left:3px solid var(--rule)}
  .qitem .qp{font-weight:600; font-size:15.5px; font-family:"Inter",sans-serif; margin-bottom:3px}
  .qitem blockquote{margin:0; font-style:italic; color:#2a2722}
  .qitem .who{font-family:"Inter",sans-serif; font-size:12.5px; color:var(--soft); margin-top:3px}
  .kicker{font-size:14.5px; color:var(--soft); margin-top:14px; font-style:normal}
  /* tables */
  table{border-collapse:collapse; width:100%; margin:14px 0; font-size:13.5px}
  th{font-family:"Inter",sans-serif; text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em;
     color:var(--soft); border-bottom:1.5px solid var(--ink); padding:6px 8px 5px; vertical-align:bottom}
  td{border-bottom:1px solid var(--rule); padding:8px; vertical-align:top; line-height:1.35}
  td.co{font-weight:700; font-size:14px; white-space:nowrap}
  .cat{display:inline-block; font-family:"Inter",sans-serif; font-size:10px; font-weight:700; letter-spacing:.04em;
       padding:2px 7px; border-radius:4px; white-space:nowrap}
  .cat.direct{background:#e9e7df; color:var(--ink); border:1px solid #cfcab4}
  .cat.adjacent{background:#e6eef1; color:#345a68; border:1px solid #c2d6dd}
  .cat.counter{background:#f1ecdd; color:var(--amber); border:1px solid #ddcfa6}
  .cat.caution{background:#f5e3df; color:var(--alert); border:1px solid #e3bdb4}
  td .fund{color:var(--soft); font-size:12.5px}
  /* charts */
  figure{margin:22px 0; padding:0}
  .chartcap{font-size:12.5px; color:var(--soft); margin:6px 2px 0; line-height:1.4}
  svg text{font-family:"Inter",sans-serif}
  /* lists */
  .wtp li,.gap li{margin:9px 0}
  .wtp .pt{font-weight:600; font-family:"Inter",sans-serif; font-size:15px}
  .region{margin:14px 0; padding-left:14px; border-left:3px solid var(--rule)}
  .region .rn{font-family:"Inter",sans-serif; font-weight:700; font-size:14px}
  .risk{margin:16px 0; padding:13px 16px; border:1px solid var(--rule); border-radius:8px}
  .risk.weak{border-style:dashed; background:#fdfaf0}
  .risk .rt{font-family:"Inter",sans-serif; font-weight:700; font-size:15px; margin-bottom:4px}
  .risk .wtag{font-family:"Inter",sans-serif; font-size:10px; font-weight:700; color:var(--amber); border:1px solid #ddcfa6; border-radius:4px; padding:1px 6px; margin-left:8px; letter-spacing:.05em}
  .gaps{font-size:14.5px; color:#2a2722}
  .homestats{display:flex; gap:26px; flex-wrap:wrap; margin:16px 0}
  .homestats .hs{flex:1; min-width:150px}
  .homestats .num{font-family:"Inter",sans-serif; font-size:30px; font-weight:800; color:var(--durable); line-height:1}
  .homestats .hl{font-size:13px; color:var(--soft); margin-top:5px}
  /* sources */
  ol.src{font-family:"Inter",sans-serif; font-size:12.5px; color:#2a2722; padding-left:0; list-style:none; counter-reset:s}
  ol.src li{padding:7px 0 7px 40px; border-bottom:1px solid var(--rule); position:relative; line-height:1.4}
  ol.src li::before{counter-increment:s; content:counter(s); position:absolute; left:0; top:7px; font-weight:700; color:var(--frozen); width:30px; text-align:right}
  ol.src li.flash{background:#fbf3d6}
  ol.src .pub{font-weight:700; color:var(--ink)}
  ol.src a{color:var(--durable); word-break:break-all; text-decoration:none}
  ol.src a:hover{text-decoration:underline}
  .foot{margin-top:40px; font-size:12px; color:var(--soft); font-family:"Inter",sans-serif; border-top:1px solid var(--rule); padding-top:12px}
  @media print{
    nav{display:none} html{scroll-behavior:auto}
    body{font-size:11.5pt} .wrap{max-width:none; padding:0}
    h2{margin-top:26px} section{break-inside:avoid}
    .verdict-sec,.comp-sec,.counter-sec,.src-sec{break-before:page}
    a[href^="http"]::after{content:" (" attr(href) ")"; font-size:8pt; color:#888; word-break:break-all}
    .cite::after{content:""}
    .risk,.qitem,figure,tr,.conf{break-inside:avoid}
  }
  @media (max-width:620px){ h1{font-size:26px} .verdict{font-size:18px} td,th{font-size:12px} }
</style>
</head>
<body>
<nav>
  <span class="navttl">ShiftMate — Market Evidence</span>
  <a class="jump" href="#verdict">Verdict</a>
  <a class="jump" href="#pain">Pain</a>
  <a class="jump" href="#competitors">Competitors</a>
  <a class="jump" href="#wtp">Pay</a>
  <a class="jump" href="#global">Global</a>
  <a class="jump" href="#counter">Risks</a>
  <a class="jump" href="#sources">Sources</a>
  <button class="btn ghost" onclick="window.print()">Save&nbsp;PDF</button>
  <button class="btn" id="pptxBtn">Export&nbsp;PPTX</button>
</nav>
<div class="wrap" id="doc"></div>

<script>const DECK = /*__DECK_DATA__*/ null;</script>
<script>
(function(){
  const D = DECK, doc = document.getElementById('doc');
  const srcByN = {}; (D.sources||[]).forEach(s=>srcByN[s.n]=s);
  // turn [n] into clickable citations with hover title
  function cites(t){
    return String(t).replace(/\[(\d+)\]/g, (m,n)=>{
      const s = srcByN[n]; const ttl = s ? (s.pub+" — "+s.title).replace(/"/g,'&quot;') : '';
      return '<a class="cite" href="#src-'+n+'" title="'+ttl+'" onclick="flashSrc('+n+')">['+n+']</a>';
    });
  }
  const esc = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // citations need to survive escaping: escape first, then linkify (brackets/digits are safe through esc)
  const richt = t => cites(esc(t));
  let h = '';

  // ---------- header ----------
  h += '<section><h1>'+esc(D.meta.title)+'</h1>'
    +  '<div class="sub">'+esc(D.meta.subtitle)+'</div>'
    +  '<div class="prov"><b>'+esc(D.meta.date)+'</b> &nbsp;·&nbsp; '+esc(D.meta.provenance)+'</div></section>';

  // ---------- verdict ----------
  h += '<section id="verdict" class="verdict-sec"><h2><span class="n">1</span>Verdict</h2>';
  h += '<p class="verdict">'+richt(D.verdict.headline)+'</p>';
  D.verdict.paras.forEach(p=> h += '<p>'+richt(p)+'</p>');
  h += '<div class="conf">';
  D.verdict.confidence.forEach(c=>{ h+='<div class="clbl">'+esc(c.label)+'</div><div class="pill '+c.level+'">'+c.level+'</div>'; });
  h += '</div>';
  h += '<figure id="sizingChart"></figure>';
  h += '</section>';

  // ---------- pain ----------
  h += '<section id="pain"><h2><span class="n">2</span>Pain-point demand</h2>';
  h += '<p class="kicker">'+richt(D.pain.intro)+'</p>';
  D.pain.items.forEach(it=>{
    h += '<div class="qitem"><div class="qp">'+richt(it.point)+'</div>'
      +  '<blockquote>“'+esc(it.quote)+'”</blockquote>'
      +  '<div class="who">— '+esc(it.who)+' '+cites('['+it.ref+']')+'</div></div>';
  });
  h += '<p class="kicker"><b>'+richt(D.pain.kicker)+'</b></p></section>';

  // ---------- competitors ----------
  h += '<section id="competitors" class="comp-sec"><h2><span class="n">3</span>Competitor validation</h2>';
  h += '<figure id="fundChart"></figure>';
  h += '<figure id="catChart"></figure>';
  h += '<table><thead><tr><th>Company</th><th>Tier</th><th>What it does</th><th>Funding / traction</th><th>Src</th></tr></thead><tbody>';
  D.competitors.forEach(c=>{
    const cat = D.categories.find(x=>x.key===c.category);
    h += '<tr><td class="co">'+esc(c.name)+'</td>'
      +  '<td><span class="cat '+c.category+'">'+esc(cat?cat.label.split(' ')[0]:c.category)+'</span></td>'
      +  '<td>'+esc(c.what)+'</td>'
      +  '<td class="fund">'+esc(c.funding)+'</td>'
      +  '<td>'+cites('['+c.ref+']')+'</td></tr>';
  });
  h += '</tbody></table>';
  h += '<p class="kicker">'+richt(D.competitorKicker)+'</p></section>';

  // ---------- wtp ----------
  h += '<section id="wtp"><h2><span class="n">4</span>Willingness to pay</h2>';
  h += '<p class="kicker">'+richt(D.wtp.intro)+'</p><ul class="wtp">';
  D.wtp.items.forEach(it=> h += '<li><span class="pt">'+richt(it.point)+'.</span> '+richt(it.detail)+' '+cites('['+it.ref+']')+'</li>');
  h += '</ul>';
  if(D.homeowner && D.homeowner.length){
    h += '<div class="homestats">';
    D.homeowner.forEach(s=> h += '<div class="hs"><div class="num">'+esc(s.stat)+'</div><div class="hl">'+richt(s.label)+' '+cites('['+s.ref+']')+'</div></div>');
    h += '</div>';
  }
  h += '<p class="kicker"><b>Honest read.</b> '+richt(D.wtp.honest)+'</p></section>';

  // ---------- global ----------
  h += '<section id="global"><h2><span class="n">5</span>Global signals</h2>';
  D.global.forEach(g=>{
    const refs = (g.refs||[]).map(n=>'['+n+']').join('');
    h += '<div class="region"><span class="rn">'+esc(g.region)+'.</span> '+richt(g.text)+' '+cites(refs)+'</div>';
  });
  h += '</section>';

  // ---------- counter ----------
  h += '<section id="counter" class="counter-sec"><h2><span class="n">6</span>Counter-evidence, risks &amp; gaps</h2>';
  h += '<p class="kicker">'+richt(D.counter.intro)+'</p>';
  D.counter.risks.forEach(r=>{
    h += '<div class="risk'+(r.weak?' weak':'')+'"><div class="rt">'+richt(r.title)+(r.weak?'<span class="wtag">WEAK SOURCE</span>':'')+'</div>'
      +  '<div>'+richt(r.body)+'</div></div>';
  });
  h += '<h3>Evidence gaps &amp; confidence notes</h3><ul class="gaps gap">';
  D.counter.gaps.forEach(g=> h += '<li>'+richt(g)+'</li>');
  h += '</ul></section>';

  // ---------- sources ----------
  h += '<section id="sources" class="src-sec"><h2><span class="n">7</span>Sources &nbsp;<span style="font-family:Inter;font-size:11px;color:var(--frozen);letter-spacing:.04em">— every claim live-verified, '+ (D.sources.length) +' entries</span></h2>';
  h += '<ol class="src">';
  D.sources.forEach(s=>{
    h += '<li id="src-'+s.n+'"><span class="pub">'+esc(s.pub)+'</span>'+(s.date?' · '+esc(s.date):'')+' — '+esc(s.title)+'<br><a href="'+esc(s.url)+'" target="_blank" rel="noopener">'+esc(s.url)+'</a></li>';
  });
  h += '</ol>';
  h += '<div class="foot">'+esc(D.meta.provenance || 'Generated by the market-validation skill.')+' · Citations [n] map to the list above; some underlying articles may appear under multiple numbers because distinct verified claims cited distinct URLs.</div>';
  h += '</section>';

  doc.innerHTML = h;

  // ---------- charts (spare SVG, Tufte) ----------
  // 1. sizing comparison
  (function(){
    if(!D.sizing || !D.sizing.bars || !D.sizing.bars.length){ const f=document.getElementById('sizingChart'); if(f) f.remove(); return; }
    const S = D.sizing, W=760, rowH=46, padL=8, padR=140, top=8;
    const bars = S.bars, max=Math.max(1, ...bars.map(b=>+b.value||0)), plotW=W-padL-padR;
    let H = top + bars.length*rowH + 6;
    let s = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="market sizing">';
    s += '<defs><pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">'
       + '<rect width="6" height="6" fill="#efeadb"/><line x1="0" y1="0" x2="0" y2="6" stroke="#bdb6a3" stroke-width="2.4"/></pattern></defs>';
    bars.forEach((b,i)=>{
      const y = top + i*rowH, w = max>0 ? (b.value/max)*plotW : 0;
      const col = b.status==='durable' ? 'var(--durable)' : (b.status==='frozen'?'url(#hatch)':'none');
      if(b.status==='ended'){
        s += '<line x1="'+padL+'" y1="'+(y+18)+'" x2="'+(padL+18)+'" y2="'+(y+18)+'" stroke="var(--alert)" stroke-width="3"/>';
        s += '<line x1="'+padL+'" y1="'+(y+11)+'" x2="'+(padL+22)+'" y2="'+(y+25)+'" stroke="var(--alert)" stroke-width="2"/>';
      } else {
        s += '<rect x="'+padL+'" y="'+(y+6)+'" width="'+Math.max(w,1)+'" height="24" fill="'+col+'" '+(b.status==='frozen'?'stroke="#bdb6a3"':'')+' rx="2"/>';
      }
      const valTxt = b.status==='ended' ? 'ended' : ('$'+b.value+'B');
      s += '<text x="'+(b.status==='ended'?padL+30:padL+Math.max(w,1)+8)+'" y="'+(y+23)+'" font-size="14" font-weight="800" fill="'+(b.status==='durable'?'var(--durable)':(b.status==='ended'?'var(--alert)':'#6b665b'))+'">'+valTxt+'</text>';
      s += '<text x="'+(W-padR+10)+'" y="'+(y+15)+'" font-size="11.5" font-weight="700" fill="var(--ink)">'+esc(b.label)+'</text>';
      s += '<text x="'+(W-padR+10)+'" y="'+(y+30)+'" font-size="10" fill="#8a857a">'+esc(b.sub)+'</text>';
    });
    s += '</svg>';
    document.getElementById('sizingChart').innerHTML = s
      + '<figcaption class="chartcap">'+richt(S.note || 'Bar length ∝ value. Solid = durable/accessible; hatched = present but not accessible; strike = ended.')+'</figcaption>';
  })();

  // 2. funding timeline
  (function(){
    if(!D.funding || !D.funding.events || !D.funding.events.length){ const f=document.getElementById('fundChart'); if(f) f.remove(); return; }
    const E = D.funding.events, W=760, H=210, padL=20, padR=20, baseY=150, top=18;
    const yrs = E.map(e=>parseInt(String(e.date).slice(0,4))).filter(n=>!isNaN(n));
    const minY = Math.min(...yrs), maxY = Math.max(...yrs);
    const t0 = new Date(minY+'-01-01').getTime(), t1 = new Date((maxY+1)+'-01-01').getTime();
    const x = d => padL + (new Date(d+'-01').getTime()-t0)/(t1-t0)*(W-padL-padR);
    const maxA = Math.max(1, ...E.map(e=>+e.amount||0)), scaleH = 96;
    let s = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="funding timeline">';
    // range-frame baseline with year ticks
    s += '<line x1="'+padL+'" y1="'+baseY+'" x2="'+(W-padR)+'" y2="'+baseY+'" stroke="var(--rule)" stroke-width="1.5"/>';
    const ticks=[]; for(let y=minY;y<=maxY;y++) ticks.push(''+y);
    ticks.forEach(yr=>{ const xx=x(yr+'-01'); s+='<line x1="'+xx+'" y1="'+baseY+'" x2="'+xx+'" y2="'+(baseY+5)+'" stroke="#b7b1a0"/><text x="'+xx+'" y="'+(baseY+18)+'" font-size="11" fill="#8a857a">'+yr+'</text>'; });
    // spread events that share a month so lollipops/labels don't collide (Tufte collision test)
    const byDate={}; E.forEach((e,i)=>{(byDate[e.date]=byDate[e.date]||[]).push(i);});
    E.forEach((e,i)=>{
      const grp=byDate[e.date]; const gi=grp.indexOf(i); const off=(gi-(grp.length-1)/2)*19;
      const xx = x(e.date)+off;
      const amt = e.amount==null ? 8 : e.amount;
      const hgt = e.amount==null ? 16 : Math.max(8,(amt/maxA)*scaleH);
      const yTop = baseY - hgt;
      const col = e.tier==='direct' ? 'var(--ink)' : (e.tier==='direct-eu' ? 'var(--ink)' : 'var(--frozen)');
      const open = e.tier==='counter' || e.amount==null;
      s += '<line x1="'+xx+'" y1="'+baseY+'" x2="'+xx+'" y2="'+yTop+'" stroke="'+col+'" stroke-width="2"/>';
      s += '<circle cx="'+xx+'" cy="'+yTop+'" r="5" fill="'+(open?'var(--paper)':col)+'" stroke="'+col+'" stroke-width="2"/>';
      const lblY = (i%2===0)? yTop-9 : yTop-9; // labels above the dot
      s += '<text x="'+xx+'" y="'+(yTop-9)+'" font-size="10.5" font-weight="800" text-anchor="middle" fill="'+col+'">'+(e.amount==null?'YC':('$'+e.amount+'M'))+'</text>';
      s += '<text x="'+xx+'" y="'+(baseY+(i%2?32:46))+'" font-size="9.5" text-anchor="middle" fill="#6b665b">'+esc(e.company.split(' ')[0])+'</text>';
    });
    // legend
    s += '<g transform="translate('+(padL)+','+top+')">'
      + '<circle cx="6" cy="0" r="5" fill="var(--ink)"/><text x="16" y="4" font-size="10.5" fill="var(--ink)">direct entrant (filled ∝ raise)</text>'
      + '<circle cx="240" cy="0" r="5" fill="var(--paper)" stroke="var(--frozen)" stroke-width="2"/><text x="250" y="4" font-size="10.5" fill="#6b665b">free / counter-model</text></g>';
    s += '</svg>';
    document.getElementById('fundChart').innerHTML = s
      + '<figcaption class="chartcap">'+richt(D.funding.note || 'Funding into the wedge over time. Bar height ∝ raise; open dots = free / counter-model entrants.')+'</figcaption>';
  })();

  // 3. category tally
  (function(){
    const counts = {}; D.competitors.forEach(c=>counts[c.category]=(counts[c.category]||0)+1);
    const order = D.categories; const total = D.competitors.length;
    const W=760, barH=22, gap=10, padL=8, labW=210, numW=30, top=4;
    const maxC = Math.max(...Object.values(counts));
    const plotW = W - padL - labW - numW - 90;
    let H = top + order.length*(barH+gap);
    const colf = {direct:'var(--ink)', adjacent:'#3f6f80', counter:'var(--amber)', caution:'var(--alert)'};
    let s = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="competitor categories">';
    order.forEach((o,i)=>{
      const n = counts[o.key]||0, y = top+i*(barH+gap);
      const w = (n/maxC)*plotW;
      s += '<text x="'+padL+'" y="'+(y+15)+'" font-size="11.5" font-weight="700" fill="var(--ink)">'+esc(o.label)+'</text>';
      s += '<rect x="'+(padL+labW)+'" y="'+y+'" width="'+w+'" height="'+barH+'" fill="'+colf[o.key]+'" rx="2"/>';
      s += '<text x="'+(padL+labW+w+8)+'" y="'+(y+15)+'" font-size="13" font-weight="800" fill="'+colf[o.key]+'">'+n+'</text>';
      s += '<text x="'+(padL+labW+plotW+44)+'" y="'+(y+15)+'" font-size="9.5" fill="#8a857a">'+esc(o.meaning)+'</text>';
    });
    s += '</svg>';
    document.getElementById('catChart').innerHTML = s
      + '<figcaption class="chartcap">'+total+' players mapped. Only the <b>direct</b> tier is straight "the market is real" validation; the <b style="color:var(--amber)">counter-model</b> and <b style="color:var(--alert)">cautionary</b> tiers are deliberately not laundered as demand.</figcaption>';
  })();

  // citation flash on click
  window.flashSrc = function(n){ const el=document.getElementById('src-'+n); if(!el) return;
    el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),1600); };

  // ---------- PPTX export ----------
  document.getElementById('pptxBtn').addEventListener('click', async function(){
    const btn=this; btn.textContent='Loading…';
    try{
      if(!window.PptxGenJS){
        await new Promise((res,rej)=>{ const sc=document.createElement('script');
          sc.src='https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js';
          sc.onload=res; sc.onerror=()=>rej(new Error('CDN blocked')); document.head.appendChild(sc); });
      }
      buildPptx(); btn.textContent='Export PPTX';
    }catch(e){ btn.textContent='PPTX (needs internet)'; alert('PPTX export needs internet to load the library, or use the pre-built .pptx file. ('+e.message+')'); setTimeout(()=>btn.textContent='Export PPTX',2500); }
  });

  function buildPptx(){
    const p = new PptxGenJS(); p.defineLayout({name:'W',width:13.33,height:7.5}); p.layout='W';
    const INK='1A1A1A', GRN='2F6B4F', SOFT='55514A', PAPER='FFFFF8', ALERT='A23B2E', AMBER='9A6312';
    const strip = t => String(t).replace(/\[(\d+)\]/g,'').replace(/[“”]/g,'"').replace(/’/g,"'").replace(/–/g,'-').replace(/—/g,'-').replace(/∝/g,'~').trim();
    function slide(){ const s=p.addSlide(); s.background={color:PAPER}; return s; }
    // title
    let s=slide();
    s.addText(strip(D.meta.title),{x:.6,y:2.2,w:12,h:1.2,fontFace:'Arial',fontSize:40,bold:true,color:INK});
    s.addText(strip(D.meta.subtitle),{x:.6,y:3.5,w:12,h:.8,fontFace:'Arial',fontSize:20,color:SOFT});
    s.addText(D.meta.date+'  ·  '+strip(D.meta.provenance),{x:.6,y:6.6,w:12,h:.5,fontFace:'Arial',fontSize:11,color:SOFT});
    // verdict
    s=slide(); s.addText('1 · Verdict',{x:.6,y:.4,w:12,h:.5,fontFace:'Arial',fontSize:14,bold:true,color:GRN});
    s.addText(strip(D.verdict.headline),{x:.6,y:1.0,w:12.1,h:1.6,fontFace:'Arial',fontSize:19,bold:true,color:INK});
    s.addText(D.verdict.paras.map(t=>({text:strip(t)+'\n',options:{breakLine:true}})),{x:.6,y:2.7,w:8.2,h:4.2,fontFace:'Arial',fontSize:12,color:'2A2722',lineSpacingMultiple:1.05,valign:'top'});
    const confRows=[[{text:'Claim',options:{bold:true,color:'FFFFFF',fill:INK}},{text:'Confidence',options:{bold:true,color:'FFFFFF',fill:INK}}]];
    D.verdict.confidence.forEach(c=>confRows.push([strip(c.label),{text:c.level,options:{bold:true,color:c.level==='HIGH'?GRN:c.level==='MODERATE'?AMBER:ALERT}}]));
    s.addTable(confRows,{x:9,y:2.7,w:3.7,fontFace:'Arial',fontSize:11,border:{type:'solid',color:'DDD8C4',pt:.5},rowH:.55});
    // pain
    s=slide(); s.addText('2 · Pain-point demand',{x:.6,y:.4,w:12,h:.5,fontFace:'Arial',fontSize:14,bold:true,color:GRN});
    let py=1.05; D.pain.items.slice(0,6).forEach(it=>{
      s.addText([{text:strip(it.point)+'  ',options:{bold:true,color:INK}},{text:'"'+strip(it.quote)+'"  ',options:{italic:true,color:'2A2722'}},{text:'— '+strip(it.who),options:{color:SOFT,fontSize:9}}],{x:.6,y:py,w:12.1,h:.92,fontFace:'Arial',fontSize:11.5,valign:'top'});
      py+=.98; });
    // competitors
    s=slide(); s.addText('3 · Competitor validation',{x:.6,y:.35,w:12,h:.5,fontFace:'Arial',fontSize:14,bold:true,color:GRN});
    const cr=[[ 'Company','Tier','What it does','Funding / traction' ].map(t=>({text:t,options:{bold:true,color:'FFFFFF',fill:INK,fontSize:9}}))];
    D.competitors.forEach(c=>{ const cat=D.categories.find(x=>x.key===c.category);
      cr.push([{text:strip(c.name),options:{bold:true}},strip(cat?cat.label.split(' ')[0]:c.category),strip(c.what),strip(c.funding)]); });
    s.addTable(cr,{x:.4,y:.95,w:12.5,colW:[1.7,1.3,5.2,4.3],fontFace:'Arial',fontSize:8,border:{type:'solid',color:'DDD8C4',pt:.5},valign:'top',autoPage:true,autoPageRepeatHeader:true});
    // wtp
    s=slide(); s.addText('4 · Willingness to pay',{x:.6,y:.4,w:12,h:.5,fontFace:'Arial',fontSize:14,bold:true,color:GRN});
    s.addText(D.wtp.items.map(it=>({text:'• '+strip(it.point)+'. '+strip(it.detail)+'\n',options:{breakLine:true}})),{x:.6,y:1.0,w:12.1,h:4.6,fontFace:'Arial',fontSize:11.5,color:'2A2722',lineSpacingMultiple:1.05,valign:'top'});
    s.addText('Honest read: '+strip(D.wtp.honest),{x:.6,y:6.0,w:12.1,h:1.1,fontFace:'Arial',fontSize:11,italic:true,color:AMBER,valign:'top'});
    // global
    s=slide(); s.addText('5 · Global signals',{x:.6,y:.4,w:12,h:.5,fontFace:'Arial',fontSize:14,bold:true,color:GRN});
    s.addText(D.global.map(g=>({text:g.region+': ',options:{bold:true,breakLine:false}})).flatMap((o,i)=>[o,{text:strip(D.global[i].text)+'\n\n',options:{breakLine:true}}]),{x:.6,y:1.0,w:12.1,h:6,fontFace:'Arial',fontSize:12,color:'2A2722',lineSpacingMultiple:1.05,valign:'top'});
    // counter
    s=slide(); s.addText('6 · Counter-evidence, risks & gaps',{x:.6,y:.4,w:12,h:.5,fontFace:'Arial',fontSize:14,bold:true,color:ALERT});
    s.addText(D.counter.risks.map(r=>({text:strip(r.title)+(r.weak?' [WEAK SOURCE]':'')+'\n'+strip(r.body)+'\n\n',options:{breakLine:true,color:r.weak?AMBER:'2A2722'}})),{x:.6,y:1.0,w:12.1,h:6,fontFace:'Arial',fontSize:10.5,lineSpacingMultiple:1.02,valign:'top'});
    // sources
    s=slide(); s.addText('7 · Sources — all live-verified ('+D.sources.length+')',{x:.6,y:.4,w:12,h:.5,fontFace:'Arial',fontSize:14,bold:true,color:GRN});
    const half=Math.ceil(D.sources.length/2);
    const mk=arr=>arr.map(x=>({text:x.n+'. '+strip(x.pub)+' — '+strip(x.title)+'\n'+x.url+'\n',options:{breakLine:true,fontSize:7.5,color:'2A2722'}}));
    s.addText(mk(D.sources.slice(0,half)),{x:.5,y:1.0,w:6.1,h:6.2,fontFace:'Arial',valign:'top'});
    s.addText(mk(D.sources.slice(half)),{x:6.8,y:1.0,w:6.1,h:6.2,fontFace:'Arial',valign:'top'});
    p.writeFile({fileName:'ShiftMate-Market-Evidence.pptx'});
  }
})();
</script>
</body>
</html>
